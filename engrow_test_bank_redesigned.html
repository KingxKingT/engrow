<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.tb-wrap { padding: 1.5rem 0; max-width: 680px; }
.tb-header { margin-bottom: 1.5rem; }
.tb-header h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.tb-header p { font-size: 13px; color: var(--color-text-secondary); }
.level-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.ltab { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; }
.ltab:hover { background: var(--color-background-secondary); }
.ltab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
.section-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; }
.stab { flex: 1; padding: 8px 4px; background: transparent; border: none; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; border-right: 0.5px solid var(--color-border-secondary); }
.stab:last-child { border-right: none; }
.stab:hover { background: var(--color-background-secondary); }
.stab.active { background: var(--color-background-secondary); color: var(--color-text-primary); }
.q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
.q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.q-num { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; }
.q-type-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.badge-mc { background: #E6F1FB; color: #0C447C; }
.badge-fill { background: #EAF3DE; color: #27500A; }
.badge-sort { background: #FAEEDA; color: #633806; }
.badge-match { background: #EEEDFE; color: #3C3489; }
.badge-error { background: #FAECE7; color: #712B13; }
.badge-write { background: #FBEAF0; color: #72243E; }
.badge-read { background: #E1F5EE; color: #085041; }
.q-text { font-size: 15px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 12px; }
.q-text em { font-style: italic; color: var(--color-text-secondary); }
.q-text strong { font-weight: 500; background: var(--color-background-secondary); padding: 0 4px; border-radius: 4px; }
.mc-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mc-btn { padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; font-size: 14px; cursor: pointer; color: var(--color-text-primary); text-align: left; transition: all 0.15s; }
.mc-btn:hover { background: var(--color-background-secondary); }
.mc-btn.selected-correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
.mc-btn.selected-wrong { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }
.mc-btn.reveal-correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
.mc-btn.disabled { pointer-events: none; opacity: 0.5; }
.mc-btn.disabled.reveal-correct { opacity: 1; }
.fill-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 15px; color: var(--color-text-primary); line-height: 2; }
.fill-input { border: none; border-bottom: 2px solid var(--color-border-primary); background: transparent; font-size: 15px; font-family: var(--font-sans); color: var(--color-text-primary); padding: 2px 4px; min-width: 80px; outline: none; text-align: center; }
.fill-input:focus { border-bottom-color: #185FA5; }
.fill-input.correct { border-bottom-color: #639922; color: #3B6D11; }
.fill-input.wrong { border-bottom-color: #E24B4A; color: #A32D2D; }
.check-btn { margin-top: 10px; padding: 6px 16px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; font-size: 13px; cursor: pointer; color: var(--color-text-primary); transition: all 0.15s; }
.check-btn:hover { background: var(--color-background-secondary); }
.sort-words { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; min-height: 40px; padding: 8px; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); }
.sort-target { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; padding: 8px; border: 0.5px solid var(--color-border-primary); border-radius: var(--border-radius-md); }
.word-chip { padding: 4px 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 14px; font-size: 13px; cursor: pointer; color: var(--color-text-primary); transition: all 0.15s; user-select: none; }
.word-chip:hover { background: var(--color-background-secondary); transform: translateY(-1px); }
.word-chip.used { opacity: 0.3; pointer-events: none; }
.word-chip.in-target { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; cursor: pointer; }
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.match-col { display: flex; flex-direction: column; gap: 6px; }
.match-item { padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; color: var(--color-text-primary); transition: all 0.15s; background: var(--color-background-primary); }
.match-item:hover { background: var(--color-background-secondary); }
.match-item.selected { border-color: #185FA5; background: #E6F1FB; color: #0C447C; }
.match-item.matched-correct { border-color: #639922; background: #EAF3DE; color: #27500A; pointer-events: none; }
.match-item.matched-wrong { border-color: #E24B4A; background: #FCEBEB; color: #A32D2D; }
.error-sentence { font-size: 15px; font-style: italic; color: var(--color-text-secondary); padding: 8px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); margin-bottom: 10px; border-left: 3px solid var(--color-border-secondary); border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; }
.underline-word { text-decoration: underline; text-decoration-style: wavy; text-decoration-color: #E24B4A; cursor: pointer; color: var(--color-text-primary); }
.feedback { margin-top: 8px; font-size: 13px; padding: 6px 10px; border-radius: var(--border-radius-md); }
.feedback.correct { background: #EAF3DE; color: #27500A; }
.feedback.wrong { background: #FCEBEB; color: #791F1F; }
.feedback.info { background: #E6F1FB; color: #0C447C; }
.passage-box { background: var(--color-background-secondary); border-left: 3px solid var(--color-border-primary); padding: 12px 16px; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; font-size: 14px; line-height: 1.7; color: var(--color-text-primary); margin-bottom: 12px; }
.write-area { width: 100%; padding: 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; font-family: var(--font-sans); font-size: 14px; color: var(--color-text-primary); resize: vertical; min-height: 80px; outline: none; }
.write-area:focus { border-color: #185FA5; }
.progress-bar-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
.progress-bar { flex: 1; height: 4px; background: var(--color-background-secondary); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--color-text-primary); border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px; }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.hint-btn { font-size: 12px; color: var(--color-text-secondary); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; margin-top: 4px; }
.hint-btn:hover { color: var(--color-text-primary); }
.hint-box { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; font-style: italic; }
.score-badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; }
</style>

<script>
const LEVELS = ['A1','A2','B1','B2','C1','C2'];
const SECTIONS = ['Grammar','Vocabulary','Reading','Dialogue','Writing'];
const DATA = {
  A1:{Grammar:[{type:'mc',q:'Choose the correct word to complete the sentence: <em>"She ___ like coffee in the morning."</em>',options:["don't","doesn't","isn't","didn't"],correct:1,hint:'Third person singular (she/he/it) uses doesn\'t in negative.'},{type:'fill',parts:['He ','[has / have]',' a very big house near the park.'],blanks:[{answer:'has',options:['has','have']}],hint:'He = third person singular → has'},{type:'sort',q:'Put these words in the right order to make a sentence:',words:['school','at','I','am','a','student'],answer:'I am a student at school',hint:'Start with I.'},{type:'mc',q:'Choose the correct verb: <em>"They ___ my best friends since school."</em>',options:['is','am','are','was'],correct:2,hint:'They = plural → are'},{type:'error',sentence:'My sister is a doctor but she work in London.',underline:'work',options:['work','works','working','worked'],correct:1,hint:'She = third person singular → works'},{type:'match',q:'Match the subject with the correct verb form:',left:['I','She','They','He'],right:['is a teacher','are happy','am tired','has a car'],pairs:{0:2,1:0,2:1,3:3}}],Vocabulary:[{type:'mc',q:'What does <strong>hungry</strong> mean?',options:['wanting to sleep','wanting to eat','feeling cold','feeling sick'],correct:1},{type:'mc',q:'What does <strong>angry</strong> mean?',options:['very happy','very tired','very upset','very excited'],correct:2},{type:'fill',parts:['I ','[made/did/had]',' a big mistake at work today.'],blanks:[{answer:'made',options:['made','did','had']}]},{type:'mc',q:'Complete: <em>"I ___ a shower every morning."</em>',options:['make','take','do','have'],correct:1,hint:'"Take a shower" is the fixed collocation.'},{type:'write',q:'Write ONE sentence using the word <strong>happy</strong>. Describe a moment or feeling.',placeholder:'e.g. I feel happy when I am with my family.',ai:true}],Reading:[{type:'read',passage:'Tom has a dog called Max. Max is brown and very friendly. Every morning, before breakfast, Tom takes Max for a walk in the park. Max loves the park because there are many other dogs to play with. Tom always brings a ball for Max to catch.',questions:[{q:'What does Tom do every morning before breakfast?',type:'mc',options:['He eats breakfast','He takes Max for a walk','He plays with a ball','He goes to work'],correct:1},{q:'What colour is Max?',type:'mc',options:['Black','White','Brown','Golden'],correct:2}]}],Dialogue:[{type:'read',passage:`<strong>Lucy:</strong> Hi James! You look a bit lost — is everything okay?\n<strong>James:</strong> Oh, hi! Yes, I'm new here. I can't find the bathroom.\n<strong>Lucy:</strong> No problem! It's on the second floor, next to the stairs.\n<strong>James:</strong> Thank you so much! This building is really confusing.\n<strong>Lucy:</strong> Don't worry, you'll get used to it quickly!`,questions:[{q:'Where is the bathroom?',type:'mc',options:['First floor, near the lift','Second floor, next to the stairs','Third floor, by the window','Ground floor, near the exit'],correct:1},{q:'Why does James need help?',type:'mc',options:["He's injured","He's new and doesn't know the building","He forgot his keys","He can't read the signs"],correct:1}]}],Writing:[{type:'write',q:'Think of an important decision you made in your life. What was it, why did you make it, and what happened? Write 40–80 words.',placeholder:'Start writing here...',ai:true,wordCount:[40,80]}]},
  A2:{Grammar:[{type:'error',sentence:'Yesterday I go to the market with my mother.',underline:'go',options:['go','gone','went','goes'],correct:2,hint:'Yesterday = past simple → went'},{type:'mc',q:'Choose the correct sentence:',options:['She is very more tall than her brother.','She is much more tall than her brother.','She is much taller than her brother.','She is very taller than her brother.'],correct:2,hint:'Comparative adjectives: tall → taller. Use "much" to intensify comparatives.'},{type:'fill',parts:['I ','[went/go/gone]',' to Paris last summer and it was incredible.'],blanks:[{answer:'went',options:['went','go','gone']}]},{type:'fill',parts:['She ','[was/is/has]',' studying when I called her.'],blanks:[{answer:'was',options:['was','is','has']}],hint:'Interrupted past action → past continuous (was + -ing)'},{type:'sort',q:'Make a correct past simple sentence:',words:['bought','a','last','I','phone','month','new'],answer:'I bought a new phone last month'},{type:'match',q:'Match the time expression with the correct tense:',left:['Yesterday I ...','Right now I ...','Every day I ...','Last year I ...'],right:['Past simple','Past simple','Present simple','Present continuous'],pairs:{0:0,1:3,2:2,3:1}}],Vocabulary:[{type:'mc',q:'What does <strong>exhausted</strong> mean?',options:['slightly tired','very angry','extremely tired','a bit bored'],correct:2},{type:'mc',q:'What does <strong>nervous</strong> mean?',options:['excited and happy','worried and anxious','angry and upset','tired and bored'],correct:1},{type:'fill',parts:['Can you ','[make/do/give]',' me a favour?'],blanks:[{answer:'do',options:['make','do','give']}],hint:'"Do a favour" is the correct collocation.'},{type:'mc',q:'The weather that day was quite grey and damp. Which word best describes it?',options:['sunny','breezy','misty','warm'],correct:2},{type:'write',q:'Write ONE sentence using the word <strong>unfortunately</strong>. It should describe something that went wrong.',placeholder:'e.g. Unfortunately, I missed the last bus home.',ai:true}],Reading:[{type:'read',passage:'Maria moved to London three years ago to look for work. At first, she found the city very big and lonely — she missed her family and the food from home. However, after a few months, she made some good friends at her new job. Now she loves the city and cannot imagine living anywhere else.',questions:[{q:'Why did Maria move to London?',type:'mc',options:['To study at university','To be with her family','To find work','To learn English'],correct:2},{q:'How did Maria\'s feelings about London change over time?',type:'mc',options:['She always loved it','She went from feeling lonely to loving it','She still misses home','She decided to leave'],correct:1}]}],Dialogue:[{type:'read',passage:`<strong>Customer:</strong> Excuse me. I bought this jacket here last week, but there's a problem with it.\n<strong>Assistant:</strong> Oh, I'm sorry to hear that. What seems to be the issue?\n<strong>Customer:</strong> The zip is broken. It got stuck the first time I used it.\n<strong>Assistant:</strong> That's not acceptable at all. Would you like a refund or an exchange?\n<strong>Customer:</strong> I really like the jacket, so I'd prefer to exchange it if possible.\n<strong>Assistant:</strong> Of course. Let me check if we have your size in stock.`,questions:[{q:'What is the problem with the jacket?',type:'mc',options:['It is the wrong size','The zip is broken','The colour is wrong','There is a hole in it'],correct:1},{q:'What does the customer decide to do?',type:'mc',options:['Get a refund','Exchange it for another jacket','Keep the broken jacket','Ask for a discount'],correct:1}]}],Writing:[{type:'write',q:'Write about something you did last week using past simple. What did you do? Where did you go? (40–80 words)',placeholder:'Start writing here...',ai:true,wordCount:[40,80]}]},
  B1:{Grammar:[{type:'error',sentence:'I have seen that film last night.',underline:'have seen',options:['have seen','had seen','saw','was seeing'],correct:2,hint:'"Last night" is a finished past time reference → past simple, not present perfect.'},{type:'mc',q:'Which sentence is grammatically correct?',options:['If I will have more money, I will travel.','If I have more money, I will travel.','If I would have more money, I will travel.','If I had more money, I will travel.'],correct:1,hint:'First conditional: If + present simple, will + infinitive.'},{type:'fill',parts:['If I ','[had/have/would have]',' more time, I would definitely travel more.'],blanks:[{answer:'had',options:['had','have','would have']}],hint:'Second conditional: If + past simple, would + infinitive.'},{type:'fill',parts:['She ','[has/have/had]',' lived in this city since she was born.'],blanks:[{answer:'has',options:['has','have','had']}],hint:'"Since" + present perfect → has lived'},{type:'sort',q:'Arrange into a correct passive sentence:',words:['written','was','The book','a','French','by','famous','author'],answer:'The book was written by a famous French author'},{type:'match',q:'Match each sentence to the correct tense or structure:',left:['She has lived here for ten years.','I saw him yesterday.','If I were rich, I would travel.','They were watching TV when I arrived.'],right:['Past continuous + past simple','Present perfect + for','Second conditional','Past simple'],pairs:{0:1,1:3,2:2,3:0}}],Vocabulary:[{type:'mc',q:'What does <strong>reluctant</strong> mean?',options:['very willing and eager','unwilling or hesitant to do something','confused about what to do','unable to do something'],correct:1},{type:'mc',q:'What does <strong>significant</strong> mean?',options:['very small and unimportant','secret and hidden','large and important enough to notice','old-fashioned'],correct:2},{type:'fill',parts:['The Prime Minister ','[made/gave/said/told]',' a speech to the nation last night.'],blanks:[{answer:'gave',options:['made','gave','said','told']}],hint:'"Give a speech" is the fixed collocation — not make or say.'},{type:'write',q:'Write ONE sentence using the word <strong>consequently</strong>. Show cause and effect.',placeholder:'e.g. She didn\'t study for the exam; consequently, she failed.',ai:true},{type:'mc',q:'What does <strong>flexible</strong> mean in a work context?',options:['very strict about rules','able to change or adapt easily','very experienced','physically strong'],correct:1}],Reading:[{type:'read',passage:'Many governments have launched campaigns encouraging citizens to recycle. However, critics argue these campaigns give people a false sense that the plastic problem is being managed, when in reality less than 10% of all plastic ever produced has been recycled. Recycling alone, they say, cannot solve the crisis — a fundamental rethinking of production and consumption is required. Asking people to simply "sort their bins" may let corporations off the hook entirely.',questions:[{q:'What do critics say about recycling campaigns?',type:'mc',options:['They are very effective','They make people believe the problem is under control when it is not','They are too expensive to run','They focus too much on corporations'],correct:1},{q:'What does the phrase "sort their bins" suggest about the author\'s view?',type:'mc',options:['Sorting bins is the most important action','Recycling alone is not enough to solve the crisis','Governments should do more bin collection','People are too lazy to recycle'],correct:1},{q:'What percentage of plastic has ever been recycled?',type:'mc',options:['More than 50%','About 25%','Less than 10%','About 40%'],correct:2}]}],Dialogue:[{type:'read',passage:`<strong>Manager:</strong> I wanted to have a quick word about the recent lateness. You've been late three times this week.\n<strong>Employee:</strong> I know, and I'm really sorry. There are roadworks near my house and the bus has been severely delayed every morning.\n<strong>Manager:</strong> I see. I appreciate you explaining. Have you looked at other routes?\n<strong>Employee:</strong> I've tried, but they all add at least 40 minutes.\n<strong>Manager:</strong> In that case, what if you worked from home on Mondays and Fridays for the next month? We can review after that.\n<strong>Employee:</strong> That would be incredibly helpful. Thank you for being so understanding.`,questions:[{q:'Why has the employee been arriving late?',type:'mc',options:['They overslept','Roadworks are causing bus delays','Their car is broken','They live too far away'],correct:1},{q:'What does the manager\'s response reveal about their approach?',type:'mc',options:['They are angry and strict','They are flexible and solution-focused','They want to fire the employee','They don\'t care about the issue'],correct:1},{q:'What do they agree on as a solution?',type:'mc',options:['A different job role','A pay cut','Working from home on Mondays and Fridays','Starting work later every day'],correct:2}]}],Writing:[{type:'write',q:'Think of an important decision you made in your life. What was it, why did you make it, and what happened? Write 80–150 words. Use at least one past perfect or conditional structure.',placeholder:'Start writing here...',ai:true,wordCount:[80,150]}]},
  B2:{Grammar:[{type:'error',sentence:'The deadline must be submitted until Friday.',underline:'until',options:['until','by','for','before of'],correct:1,hint:'"By" marks a deadline point in time. "Until" describes a continuous action up to a time.'},{type:'error',sentence:'Despite of the heavy rain, the match continued.',underline:'Despite of',options:['Despite of','Although','Despite','Even so'],correct:2,hint:'"Despite" is followed directly by a noun phrase, never "of".'},{type:'fill',parts:['She ','[must/should/would]',' have taken the promotion — she seems so much happier now.'],blanks:[{answer:'must',options:['must','should','would']}],hint:'"Must have" = logical deduction about the past based on evidence.'},{type:'fill',parts:['By the time we arrived, the film ','[has/had/would]',' already started.'],blanks:[{answer:'had',options:['has','had','would']}],hint:'Action completed before another past action → past perfect (had + past participle).'},{type:'sort',q:'Build a third conditional sentence:',words:['I','had','If','the','job','accepted','would','have','I','regretted','it'],answer:'If I had accepted the job I would have regretted it'},{type:'mc',q:'Choose the correct form: <em>"She wishes she ___ medicine instead of law."</em>',options:['would study','studies','had studied','was studying'],correct:2,hint:'"Wish" about the past uses past perfect: wish + had + past participle.'}],Vocabulary:[{type:'mc',q:'What does <strong>ambiguous</strong> mean?',options:['very clear and easy to understand','having more than one possible meaning','completely wrong','very formal in tone'],correct:1},{type:'mc',q:'What does <strong>inevitable</strong> mean?',options:['something that can be prevented','something that might happen','something that will certainly happen','something that already happened'],correct:2},{type:'write',q:'Write a sentence using <strong>albeit</strong> to show a contrast within the same idea.',placeholder:'e.g. The plan was successful, albeit more expensive than expected.',ai:true},{type:'fill',parts:['The new law came ','[into/in/to/onto]',' effect last January.'],blanks:[{answer:'into',options:['into','in','to','onto']}],hint:'"Come into effect" is a fixed phrase meaning to become active or operational.'},{type:'mc',q:'What does <strong>arbitrary</strong> mean?',options:['based on careful evidence','based on skill and practice','decided by random chance or personal whim','decided by a group of experts'],correct:2}],Reading:[{type:'read',passage:'Research consistently links heavy social media use to rising rates of anxiety, depression, and loneliness — yet these same platforms were designed to connect people. This is the paradox at the heart of the debate. Some researchers point to amplification effects, arguing that platforms worsen pre-existing mental health conditions rather than cause new ones. Others focus on addictive design patterns: infinite scroll, variable reward notifications, and algorithmically curated content that maximises time on screen. Governments have begun calling for independent audits, though whether these will lead to binding regulation remains deeply uncertain.',questions:[{q:'What is "the paradox" referred to in the passage?',type:'mc',options:['Social media is popular but boring','Platforms designed to connect people are making them more isolated','People use social media but don\'t like it','Governments support social media companies'],correct:1},{q:'What does the final sentence imply?',type:'mc',options:['Regulation is certain to come soon','The harm is proven and action will definitely be taken','There is doubt that audits will lead to real legal change','Governments are not interested in the issue'],correct:2},{q:'Which two explanations for the link between social media and mental health are mentioned?',type:'mc',options:['Loneliness and addiction','Amplification of pre-existing conditions and addictive design patterns','Poor content quality and too much advertising','Government inaction and corporate greed'],correct:1}]}],Dialogue:[{type:'read',passage:`<strong>Interviewer:</strong> During your CV gap, what were you actually doing?\n<strong>Candidate:</strong> I completed a professional analytics course online and spent six months volunteering with a local charity, independently managing their donor communications.\n<strong>Interviewer:</strong> Interesting. When you say "independently" — do you mean you had formal oversight, or were you entirely self-directed?\n<strong>Candidate:</strong> Entirely self-directed. I set my own targets, reported to no one, and built their system from scratch.\n<strong>Interviewer:</strong> And how does that period connect to the role you're applying for today?\n<strong>Candidate:</strong> It was entirely intentional. I knew I wanted to move into data-driven communications, and I used the gap to build the skills I was missing.`,questions:[{q:'Name two things the candidate did during their gap year.',type:'mc',options:['Travelled and learned languages','Completed an analytics course and volunteered at a charity','Worked part-time and studied full-time','Took care of family and freelanced'],correct:1},{q:'Why does the interviewer ask about the word "independently"?',type:'mc',options:['They think the candidate is lying','They want to check whether it means formally supervised or self-directed','They don\'t know what the word means','They are testing the candidate\'s language skills'],correct:1},{q:'How does the candidate\'s gap period connect to their current application?',type:'mc',options:['It was unplanned but worked out','It shows the gap was intentional and designed to build relevant skills','It proves they were unemployable elsewhere','It shows they prefer working alone'],correct:1}]}],Writing:[{type:'write',q:'A friend is considering quitting their stable job to start a business. Write them an email of advice (100–160 words). Use at least one modal of advice (should, ought to, might want to) and one conditional.',placeholder:'Dear [Name]...',ai:true,wordCount:[100,160]}]},
  C1:{Grammar:[{type:'mc',q:'Choose the correct form for formal recommendation: <em>"The committee recommended that the funding ___ distributed equally."</em>',options:['is','was','be','will be'],correct:2,hint:'After "recommend that," use the subjunctive: base form (be), not is/was.'},{type:'error',sentence:'No sooner she had sat down than the phone rang.',underline:'she had sat',options:['she had sat','had she sat','she sat','had sat she'],correct:1,hint:'After "No sooner," invert subject and auxiliary: "No sooner had she sat down..."'},{type:'fill',parts:['It is essential that every student ','[submits/submit/submitted]',' the form before the deadline.'],blanks:[{answer:'submit',options:['submits','submit','submitted']}],hint:'After "it is essential that," use the subjunctive base form, not third-person -s.'},{type:'fill',parts:['','[Had/If I had/Should]',' I known about the problem earlier, I could have prevented it.'],blanks:[{answer:'Had',options:['Had','If I had','Should']}],hint:'Inverted third conditional: "Had I known" = "If I had known". Formal written English.'},{type:'sort',q:'Rewrite in passive, keeping "The new policy" as subject:',words:['The','new','policy','has','been','implemented','the','by','government'],answer:'The new policy has been implemented by the government'},{type:'error',sentence:'The suspect was said to have being involved in the fraud.',underline:'being',options:['being','be','been','have been'],correct:2,hint:'"To have been" is the perfect infinitive passive. "Being" is incorrect here.'}],Vocabulary:[{type:'mc',q:'What does <strong>mitigate</strong> mean?',options:['to make a problem worse','to ignore a problem completely','to make a problem less severe','to fully solve a problem'],correct:2},{type:'mc',q:'What does <strong>sycophantic</strong> mean?',options:['genuinely admiring and respectful','excessively flattering to gain personal advantage','critically honest and direct','emotionally detached and cold'],correct:1},{type:'write',q:'Write ONE sentence using <strong>exacerbate</strong> in an academic or formal context.',placeholder:'e.g. The government\'s delay in responding only served to exacerbate tensions in the region.',ai:true},{type:'mc',q:'Choose the word that fits: <em>"His speech was full of ___, hollow phrases that said nothing new."</em>',options:['platitudes','attitudes','magnitudes','latitudes'],correct:0,hint:'"Platitudes" are overused, unoriginal statements that sound meaningful but say little.'},{type:'mc',q:'What does <strong>equivocal</strong> mean?',options:['very clear and decisive','having a double or uncertain meaning','morally wrong','technically accurate'],correct:1}],Reading:[{type:'read',passage:'Proponents of Universal Basic Income argue that the rise of automation represents an unprecedented threat to employment — one that traditional welfare systems are not equipped to handle. Critics, however, question the underlying assumption: that this wave of technological disruption is fundamentally different from previous ones. The Industrial Revolution displaced the weavers of the 1800s, yet new industries emerged. The certainty of catastrophe, these critics suggest, is no more defensible than complacency. What is clear is that the debate turns not on whether jobs will change — they will — but on whether societies will act with sufficient foresight to manage that change humanely.',questions:[{q:'What assumption in the pro-UBI argument do critics question?',type:'mc',options:['That automation is bad for workers','That previous disruptions were less severe than today\'s','That automation is unprecedented, when historically economies adapt','That governments should control technology'],correct:2},{q:'What does "the certainty of catastrophe is no more defensible than complacency" suggest about the author?',type:'mc',options:['The author strongly supports UBI','The author thinks catastrophe is certain','The author is balanced and avoids taking a firm side','The author believes we should do nothing'],correct:2},{q:'What historical example is used and what point does it make?',type:'mc',options:['The French Revolution — showing that change is violent','Industrial Revolution weavers — showing that past displacement did not prevent new industries from emerging','The invention of the internet — showing technology always creates jobs','World War II — showing that economies can recover quickly'],correct:1}]}],Dialogue:[{type:'read',passage:`<strong>Journalist:</strong> Minister, the housing targets were missed for the fourth consecutive year. At what point does a target become meaningless?\n<strong>Minister:</strong> I understand the frustration, but these are complex structural issues. We remain fully committed to the programme.\n<strong>Journalist:</strong> You told Parliament last spring you were "confident" the targets would be met. Were you confident?\n<strong>Minister:</strong> I was confident in the direction of the programme, yes.\n<strong>Journalist:</strong> Confident, or certain?\n<strong>Minister:</strong> Well... I was confident we had the right approach. Whether every figure would be hit — I couldn't be certain of that.`,questions:[{q:'What technique does the journalist use in their opening question?',type:'mc',options:['They ask a vague general question','They use specific evidence (four consecutive years) to challenge the minister\'s credibility','They express sympathy for the minister\'s situation','They ask the minister to explain government policy'],correct:1},{q:'What does the minister\'s final answer reveal?',type:'mc',options:['They were always secretly confident','They had full parliamentary support','They did not have guaranteed certainty — "confident" was overstated','They blame the journalist for misquoting them'],correct:2},{q:'What is the purpose of pressing the minister on "confident" vs "certain"?',type:'mc',options:['To test the minister\'s vocabulary','To show that the journalist is pedantic','To expose the gap between public confidence and private doubt','To confuse the audience'],correct:2}]}],Writing:[{type:'write',q:'Write a formal argumentative paragraph (120–200 words) on the following: <em>"Governments have a duty to regulate social media platforms."</em> Use hedging language, a counter-argument, and a coherent conclusion.',placeholder:'Start your argument here...',ai:true,wordCount:[120,200]}]},
  C2:{Grammar:[{type:'mc',q:'Which sentence correctly uses an inverted conditional with a distancing modal?',options:['Should it be the case that the board refuses, the offer would lapse.','Should the board would refuse, the offer lapses.','Were the board to refuses, the offer would lapse.','Had the board refused, the offer will lapse.'],correct:0,hint:'"Should it be the case that + present simple" = formal inverted conditional. Grammatically precise.'},{type:'error',sentence:'The legislation, for all its flaws, have been broadly welcomed by industry.',underline:'have',options:['have','has','having','had'],correct:1,hint:'The subject is "The legislation" (singular), not the plural phrase in commas. → has.'},{type:'fill',parts:['Not until the results were published ','[did the committee realise / the committee realised / the committee did realise]',' the scale of the problem.'],blanks:[{answer:'did the committee realise',options:['did the committee realise','the committee realised','the committee did realise']}],hint:'"Not until..." triggers subject-auxiliary inversion: did + subject + verb.'},{type:'sort',q:'Build a formally inverted concessive clause:',words:['be','may','however','the','circumstances','difficult'],answer:'However difficult the circumstances may be'},{type:'mc',q:'Which option uses the correct subjunctive in a formal register?',options:['It is vital that the report is submitted on time.','It is vital that the report be submitted on time.','It is vital that the report would be submitted on time.','It is vital that the report should submitted on time.'],correct:1,hint:'Formal subjunctive: base form "be" — not "is", "would be", or "should be submitted".'},{type:'write',q:'Rewrite this sentence using nominalization and a passive voice: <em>"The engineers quickly solved the problem."</em>',placeholder:'e.g. A swift resolution of the problem was achieved by...',ai:true}],Vocabulary:[{type:'mc',q:'What does <strong>tendentious</strong> mean?',options:['balanced and objective','promoting a particular cause or point of view','academic and formal in style','obscure and difficult to understand'],correct:1},{type:'mc',q:'What does <strong>pellucid</strong> mean?',options:['extremely obscure and unclear','translucently clear, in style or thought','emotionally intense','logically contradictory'],correct:1},{type:'write',q:'Use <strong>ineluctable</strong> in a sentence to describe something unavoidable in a formal or literary register.',placeholder:'e.g. The ineluctable logic of the market...',ai:true},{type:'mc',q:'Choose the word that most precisely fits: <em>"His argument, while superficially coherent, rested on a fundamental ___."</em>',options:['paradox','tautology','syllogism','polemic'],correct:1,hint:'"Tautology" = a statement that is necessarily true by its own definition, adding no new information — a logical flaw.'},{type:'mc',q:'What is the best definition of <strong>peripatetic</strong>?',options:['tending to argue and debate','moving or travelling from place to place','overly cautious and hesitant','formally educated and academic'],correct:1}],Reading:[{type:'read',passage:'The tension between judicial independence and democratic accountability has never been fully resolved in liberal constitutional theory. Courts that strike down legislation passed by elected majorities inevitably attract the charge of counter-majoritarianism — the accusation that an unelected judiciary is substituting its own preferences for those of the people. Yet defenders of judicial review contend that democracy is not reducible to majority rule: if constitutional rights are to mean anything, they must be enforceable even against the wishes of a transient parliamentary majority. The debate thus forces us to confront a prior question: what do we mean, precisely, when we invoke "democracy"?',questions:[{q:'What is "counter-majoritarianism" as used in the passage?',type:'mc',options:['A theory that courts should have more power than parliaments','The accusation that courts override elected majorities with their own preferences','The view that minorities should be protected from majority rule','A political movement opposed to constitutional reform'],correct:1},{q:'How do defenders of judicial review respond to the charge?',type:'mc',options:['They argue courts always reflect public opinion','They deny that courts ever strike down legislation','They argue democracy means more than majority rule and rights must be protected from transient majorities','They argue the judiciary should be elected'],correct:2},{q:'What "prior question" does the author say the debate forces us to confront?',type:'mc',options:['Whether courts should be reformed','What we actually mean by the concept of democracy itself','Whether rights should be written into law','Whether judges should be politically neutral'],correct:1}]}],Dialogue:[{type:'read',passage:`<strong>Chair:</strong> Professor, your paper claims the evidence for this intervention is "robust." The Cochrane review published last March rated it as low-certainty. How do you reconcile those characterisations?\n<strong>Professor:</strong> The Cochrane review used a GRADE framework that penalises heterogeneity across trials. Our meta-analysis controlled for baseline confounds.\n<strong>Chair:</strong> Controlled for, or adjusted post-hoc?\n<strong>Professor:</strong> The adjustments were pre-registered in our protocol.\n<strong>Chair:</strong> Registered before or after you saw the data?\n<strong>Professor:</strong> Before final analysis, yes — though some preliminary figures were available at the time of registration.\n<strong>Chair:</strong> That's not pre-registration as it is ordinarily understood in the field, is it?`,questions:[{q:'What specific methodological conflict does the Chair identify?',type:'mc',options:['The professor used the wrong statistics','The Cochrane review contradicts the professor\'s "robust" claim, given it rated evidence as low-certainty','The professor has no peer-reviewed publications','The professor used data from a different country'],correct:1},{q:'What does the Chair\'s final question imply about the professor\'s pre-registration?',type:'mc',options:['The professor correctly followed the protocol','The professor\'s pre-registration is technically accurate but does not meet the standard the field actually requires','The professor is fraudulent','The professor registered the wrong protocol'],correct:1},{q:'How does the dialogue structure reveal the Chair\'s strategy?',type:'mc',options:['The Chair attacks the professor personally','The Chair asks vague general questions','The Chair progressively narrows each answer to expose a logical inconsistency about methodology and research integrity','The Chair agrees with the professor at every step'],correct:2}]}],Writing:[{type:'write',q:'Write a critically analytical paragraph (150–220 words) responding to: <em>"Expertise is overrated in democratic decision-making."</em> Your paragraph should acknowledge complexity, deploy precise hedging, and reach a nuanced position.',placeholder:'Begin your analytical response...',ai:true,wordCount:[150,220]}]}
};
const SECTION_MAP = {Grammar:'grammar',Vocabulary:'vocabulary',Reading:'reading',Dialogue:'dialogue',Writing:'writing'};
const CEFR_LEVELS = ['A1','A2','B1','B2','C1','C2'];
const SKILL_ORDER = ['grammar','vocabulary','reading','writing','dialogue'];
// Convert DATA to question-bank format for placement test
const CONVERTED = {};
SKILL_ORDER.forEach(skill => { CONVERTED[skill] = {}; CEFR_LEVELS.forEach(l => { CONVERTED[skill][l] = []; }); });
let idCounter = {};
function nextId(skill, level) {
  const key = skill+'_'+level;
  idCounter[key] = (idCounter[key]||0)+1;
  return skill[0]+'-'+level.toLowerCase()+'-'+idCounter[key];
}
CEFR_LEVELS.forEach(level => {
  const sections = DATA[level];
  if (!sections) return;
  Object.entries(sections).forEach(([sectionName, questions]) => {
    const skill = SECTION_MAP[sectionName];
    if (!skill) return;
    questions.forEach(q => {
      if (q.type === 'read') {
        // Flatten read type into individual MC questions
        q.questions.forEach((subq, si) => {
          const id = nextId(skill, level);
          const conv = { id, type: 'mc', instruction: subq.q, options: subq.options, correct: subq.options[subq.correct], correctIndex: subq.correct };
          if (q.passage) conv.text = q.passage.replace(/<[^>]+>/g,'');
          CONVERTED[skill][level].push(conv);
        });
      } else if (q.type === 'write') {
        const id = nextId(skill, level);
        const conv = { id, type: 'free_write', instruction: q.q.replace(/<[^>]+>/g,''), ai: true };
        if (q.wordCount) { conv.minWords = q.wordCount[0]; conv.maxWords = q.wordCount[1]; }
        if (q.ai !== undefined) conv.ai = q.ai;
        CONVERTED[skill][level].push(conv);
      } else {
        const id = nextId(skill, level);
        const conv = { id, type: q.type, instruction: (q.q||'').replace(/<[^>]+>/g,'') };
        if (q.options) conv.options = q.options;
        if (q.type === 'mc' || q.type === 'error') {
          conv.correct = q.options[q.correct];
          conv.correctIndex = q.correct;
        } else if (q.type === 'fill') {
          conv.correct = q.blanks[0].answer;
          conv.parts = q.parts;
          conv.blanks = q.blanks;
        } else if (q.type === 'sort') {
          conv.correct = q.answer;
          conv.words = q.words;
        } else if (q.type === 'match') {
          conv.left = q.left;
          conv.right = q.right;
          conv.pairs = q.pairs;
        }
        if (q.sentence) conv.sentence = q.sentence;
        if (q.underline) conv.underline = q.underline;
        if (q.hint) conv.hint = q.hint;
        if (q.text) conv.text = q.text;
        if (q.question) conv.question = q.question;
        CONVERTED[skill][level].push(conv);
      }
    });
  });
});
// Output as JSON (for build use)
console.log(JSON.stringify(CONVERTED, null, 2));
